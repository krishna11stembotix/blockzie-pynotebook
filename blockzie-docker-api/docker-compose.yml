version: "3.9"

services:
  blockzie-backend:
    container_name: blockzie-backend
    image: blockzie-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      BLOCKZIE_DOCKER_IMAGE: blockzie-python
      BLOCKZIE_EXEC_TIMEOUT: 15
      BLOCKZIE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped